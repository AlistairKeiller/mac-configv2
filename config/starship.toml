"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"

format = """
$os\
$directory\
$git_branch\
$git_status\
$rust\
$python\
$nodejs\
$golang\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

add_newline = true

[os]
disabled = false
format = "[$symbol ](fg:subtext1)"
[os.symbols]
Macos = ""

[directory]
truncation_length = 3
truncation_symbol = "…/"
format = "[$path ](fg:blue bold)[$read_only](fg:red)"

[git_branch]
format = "[$symbol$branch(:$remote_branch) ](fg:mauve)"
symbol = " "

[git_status]
format = "([$all_status$ahead_behind ](fg:yellow))"
ahead = "⬆${count}"
behind = "⬇${count}"
diverged = "⬆${ahead_count}⬇${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"
stashed = "≡"

[rust]
format = "[$symbol$version ](fg:peach)"
symbol = " "

[python]
format = "[$symbol$version ](fg:yellow)"
symbol = " "

[nodejs]
format = "[$symbol$version ](fg:green)"
symbol = " "

[golang]
format = "[$symbol$version ](fg:sky)"
symbol = " "

[cmd_duration]
format = "[$duration ](fg:yellow)"
min_time = 2_000

[time]
disabled = false
format = "[$time](fg:subtext0)"
time_format = "%H:%M"

[character]
success_symbol = "[❯](fg:green)"
error_symbol = "[❯](fg:red)"
vimcmd_symbol = "[❮](fg:blue)"

[fill]
symbol = " "

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
